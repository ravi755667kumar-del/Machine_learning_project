<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Language Detector</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
        }
        .title { color: #333; font-size: 28px; margin-bottom: 10px; font-weight: 700; }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 15px; }
        
        .text-input {
            width: 100%; height: 120px; padding: 15px; border-radius: 12px;
            border: 2px solid #e0e0e0; font-size: 16px; resize: none; outline: none;
            background: rgba(255, 255, 255, 0.9); transition: all 0.3s ease;
        }
        .text-input:focus { border-color: #e73c7e; box-shadow: 0 0 10px rgba(231, 60, 126, 0.2); }
        
        .predict-btn {
            width: 100%; margin-top: 20px; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        .predict-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4); }
        .predict-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .result-box, .error-box { display: none; margin-top: 25px; padding: 20px; border-radius: 12px; font-size: 18px; }
        .result-box { background: #f8f9fa; border-left: 5px solid #23a6d5; color: #333; }
        .error-box { background: #ffe5e5; color: #d8000c; }
        .highlight { display: block; font-size: 24px; color: #e73c7e; margin-top: 10px; text-transform: capitalize; font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1 class="title">✨ Language Detector</h1>
        <p class="subtitle">Type below to instantly detect the language!</p>

        <textarea id="inputText" class="text-input" placeholder="e.g., Bonjour tout le monde..."></textarea>
        
        <button id="submitBtn" class="predict-btn" onclick="detectLanguage()">Detect Language</button>

        <div id="errorBox" class="error-box"></div>
        
        <div id="resultBox" class="result-box">
            <span>Predicted Language:</span>
            <span id="predictionText" class="highlight"></span>
        </div>
    </div>

    <script>
        async function detectLanguage() {
            const inputText = document.getElementById('inputText').value;
            const btn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');
            const predictionText = document.getElementById('predictionText');

            // Reset view
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';

            if (!inputText.trim()) {
                errorBox.innerText = 'Please enter some text first!';
                errorBox.style.display = 'block';
                return;
            }

            // Show loading state
            btn.innerText = 'Detecting...';
            btn.disabled = true;

            try {
                // Talk to Django backend
                const response = await fetch('http://127.0.0.1:8000/api/predict/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: inputText }),
                });

                const data = await response.json();

                if (data.prediction) {
                    predictionText.innerText = data.prediction;
                    resultBox.style.display = 'block';
                } else {
                    errorBox.innerText = data.error || 'Something went wrong.';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = 'Failed to connect to the backend server. Is Django running?';
                errorBox.style.display = 'block';
            } finally {
                // Revert button state
                btn.innerText = 'Detect Language';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
